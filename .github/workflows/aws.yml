name: Deploy to Amazon ECS

on:
  push:
    branches: [ "dev" ]

env:
  AWS_REGION: us-east-1                  
  ECS_CLUSTER: new_cluster               
  ECS_SERVICE: new_secvice               
  ECS_TASK_DEFINITION: task-definition.json # Looks for this file in your root folder
  CONTAINER_NAME: arunconty               
  IMAGE_NAME: arun586/service_1:latest   

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Create ECS Cluster if missing
      run: |
        CLUSTER_EXISTS=$(aws ecs list-clusters --query "clusterArns[?contains(@, '${{ env.ECS_CLUSTER }}')]" --output text)
        if [ -z "$CLUSTER_EXISTS" ]; then
          aws ecs create-cluster --cluster-name ${{ env.ECS_CLUSTER }}
        fi

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ env.IMAGE_NAME }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
