name: Deploy Ubuntu 26.04 using app-ino Key

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate with AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Create or Reuse Security Group and Add Rules
        id: create-sg
        run: |
          SG_NAME="github-actions-sg-${{ github.run_id }}"
          VPC_ID="vpc-022a26196a0f835e1"
          
          echo "Checking if Security Group '$SG_NAME' already exists..."
          # Query AWS to see if this specific group name exists in your VPC
          EXISTING_SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=$SG_NAME" "Name=vpc-id,Values=$VPC_ID" \
            --query "SecurityGroups[0].GroupId" \
            --output text)

          if [ "$EXISTING_SG_ID" != "None" ] && [ -n "$EXISTING_SG_ID" ]; then
            echo "Security Group already exists! Reusing ID: $EXISTING_SG_ID"
            SG_ID=$EXISTING_SG_ID
          else
            echo "Security Group does not exist. Creating a new one..."
            SG_ID=$(aws ec2 create-security-group \
              --group-name "$SG_NAME" \
              --description "Created via GitHub Actions to allow all TCP" \
              --vpc-id "$VPC_ID" \
              --query 'GroupId' --output text)
            
            echo "Generated New SG ID: $SG_ID"
            
            # Authorize ports only for a newly created group to avoid duplicate rule warnings
            aws ec2 authorize-security-group-ingress \
              --group-id "$SG_ID" \
              --protocol tcp \
              --port 0-65535 \
              --cidr 0.0.0.0/0
          fi
          
          echo "SG_ID=$SG_ID" >> $GITHUB_ENV

      - name: Launch EC2 and Install Nginx
        id: ec2-run
        run: |
          RAW_OUTPUT=$(aws ec2 run-instances \
            --image-id resolve:ssm:/aws/service/canonical/ubuntu/server/26.04/stable/current/amd64/hvm/ebs-gp3/ami-id \
            --instance-type t2.micro \
            --key-name "app-ino" \
            --subnet-id subnet-06e59c0cea05464af \
            --security-group-ids ${{ env.SG_ID }} \
            --associate-public-ip-address \
            --user-data '#!/bin/bash
            apt-get update -y
            apt-get install nginx -y
            systemctl start nginx
            systemctl enable nginx
            echo "<h1>Hello World from Ubuntu 26.04!</h1>" > /var/www/html/index.html')

          INSTANCE_ID=$(echo "$RAW_OUTPUT" | jq -r '.Instances[0].InstanceId')
          
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "null" ]; then
            echo "❌ ERROR: AWS failed to create the instance! Raw response below:"
            echo "$RAW_OUTPUT"
            exit 1
          fi

          echo "Instance successfully launched! ID: $INSTANCE_ID"
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      - name: Wait for Public IP and Display URL
        run: |
          echo "Waiting 15 seconds for AWS to assign a Public IP..."
          sleep 15
          
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids ${{ env.INSTANCE_ID }} \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          
          echo "🚀 DEPLOYMENT SUCCESSFUL!"
          echo "🔗 Access your Nginx website here: http://$PUBLIC_IP"
          echo "💻 To connect via SSH: ssh -i app-ino.pem ubuntu@$PUBLIC_IP"
